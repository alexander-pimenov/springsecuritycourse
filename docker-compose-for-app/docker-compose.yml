  ## --------------------------------- Postgres --------------------------------- ##
  postgres-db:
    image: docker.io/postgres:15.3-alpine3.18
    container_name: postgres-db
    mem_limit: 1600m
    command:
      - "postgres"
      - "-c"
      - "max_connections=16"
    #      - "-p"
    #      - "6432"
    environment:
      POSTGRES_DB: springsecuritycourse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
    volumes:
      - ./init-script:/docker-entrypoint-initdb.d:Z  #скрипты инициализации БД
#      - postgres_data:/var/lib/postgresql/data  # для сохранения в volume
      - ./postgres-data:/var/lib/postgresql/data:Z  # для сохранения данных БД, вариант с host path (если нужен явный контроль)
    ports:
      - "6432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d springsecuritycourse" ]
      #      test: [ "CMD-SHELL", "pg_isready -U postgres -p 6432 -d springsecuritycourse" ]
      interval: 10s
      timeout: 10s
      retries: 30
    networks:
      - kafka-postgres-net


